<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>拾得物台帳 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── Base & Layout ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans JP', -apple-system, sans-serif;
            background: linear-gradient(160deg, #0a0f1e 0%, #101b35 50%, #0d1a2d 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; animation: screenIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Common UI ── */
        .app-header {
            display: flex; align-items: center; padding: 14px 20px; gap: 10px;
            background: rgba(10, 15, 30, 0.85); border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .app-header h1 { font-size: 17px; font-weight: 700; color: #f1f5f9; }
        .back-btn { background: none; border: none; color: #94a3b8; font-size: 22px; cursor: pointer; padding: 6px 10px 6px 0; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 17px 24px; border: none; border-radius: 18px;
            font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; width: 100%; position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: #fff; box-shadow: 0 6px 30px rgba(59, 130, 246, 0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #047857 100%); color: #fff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lg { padding: 20px 28px; font-size: 18px; border-radius: 20px; }

        /* ── Forms ── */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .form-input, .form-textarea {
            width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; color: #f1f5f9; font-family: inherit; font-size: 15px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── Home Hero ── */
        .hero-section { padding: 40px 24px; text-align: center; display: flex; flex-direction: column; gap: 24px; align-items: center; }
        .home-logo { font-size: 80px; filter: drop-shadow(0 8px 32px rgba(59, 130, 246, 0.4)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .home-title { font-size: 28px; font-weight: 900; color: #f1f5f9; line-height: 1.3; }
        .home-subtitle { font-size: 14px; color: #64748b; margin-top: 8px; }

        /* ── List UI (Tabs & Filters) ── */
        .list-container { background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: 50px; }
        .list-header-sticky { position: sticky; top: 0; z-index: 40; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .period-tabs { display: flex; padding: 0 16px; margin-bottom: 12px; }
        .period-tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 700; color: #475569; border: none; background: none; font-family: inherit; cursor: pointer; border-bottom: 2px solid transparent; }
        .period-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
        .filter-bar { padding: 0 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #64748b; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .filter-chip.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        /* ── Item Cards ── */
        .cards-area { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .item-card { display: flex; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 14px; align-items: stretch; }
        .item-card.returned { opacity: 0.6; }
        .item-thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 12px; background: rgba(255,255,255,0.03); flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .item-name { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        
        /* バッジのデザイン */
        .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 5px; }
        .badge-pending { background: rgba(234,179,8,0.12); color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); }
        .badge-returned { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
        .badge-police { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
        
        /* アクションボタン */
        .action-btns { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
        .return-btn-small { padding: 5px 12px; font-size: 11px; font-weight: 700; border: 1px solid rgba(139,92,246,0.3); background: rgba(139,92,246,0.08); color: #a78bfa; border-radius: 12px; cursor: pointer; }
        .police-btn { border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); color: #60a5fa; }
        .delete-btn { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); color: #f87171; }

        /* ── 備考（Notes）エリアのデザイン ── */
        .item-notes {
            flex: 0 0 42%; 
            font-size: 11px;
            color: #cbd5e1;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 8px;
            border-radius: 8px;
            white-space: pre-wrap; 
            word-break: break-all; 
            line-height: 1.4;
            max-height: 80px;
            overflow-y: auto;
        }

        /* ── Toast & Modal ── */
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30, 40, 60, 0.95); color: #f1f5f9; padding: 14px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; z-index: 100; opacity: 0; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.open { display: flex; }
        .modal-img { max-width: 90vw; max-height: 80vh; border-radius: 12px; }

        /* ── Utils ── */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59,130,246,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="screen-setup" class="screen active">
        <div class="hero-section">
            <div class="home-logo">⚙️</div>
            <div style="background: rgba(255,255,255,0.04); padding: 28px; border-radius: 24px; width: 100%; max-width: 400px;">
                <h2 style="margin-bottom: 12px;">初回設定</h2>
                <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">GASのデプロイURLを入力してください。</p>
                <textarea class="form-input" id="gas-url-input" rows="3" placeholder="https://script.google.com/macros/s/XXXX/exec" style="margin-bottom: 15px;"></textarea>
                <button class="btn btn-primary" onclick="saveGasUrl()">✅ 設定を保存して開始</button>
            </div>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="hero-section">
            <div class="home-logo">📦</div>
            <div>
                <h1 class="home-title">拾得物台帳 Pro</h1>
                <p class="home-subtitle">AIが画像を解析して自動で台帳を作成します</p>
            </div>
            <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary btn-lg" onclick="openCamera()">📷 撮影して登録</button>
                <button class="btn btn-secondary" onclick="scrollToList()" style="font-size: 14px;">📋 履歴を確認（下へ）</button>
                <button class="btn btn-secondary" onclick="showScreen('setup')" style="font-size: 12px; padding: 10px;">⚙️ URL設定変更</button>
            </div>
        </div>

        <div class="list-container" id="list-section">
            <div class="list-header-sticky">
                <div class="period-tabs">
                    <button class="period-tab active" id="pt-week" onclick="setPeriod('week')">今週</button>
                    <button class="period-tab" id="pt-month" onclick="setPeriod('month')">今月</button>
                    <button class="period-tab" id="pt-all" onclick="setPeriod('all')">全部</button>
                </div>
                <div class="filter-bar">
                    <button class="filter-chip active" id="fc-all" onclick="setFilter('all')">すべて</button>
                    <button class="filter-chip" id="fc-keep" onclick="setFilter('keep')">保管中</button>
                    <button class="filter-chip" id="fc-ret" onclick="setFilter('ret')">返却済み</button>
                    <button class="filter-chip" id="fc-police" onclick="setFilter('police')">警察届出</button>
                </div>
                <div id="stats-label" style="padding: 0 16px; font-size: 11px; color: #475569;"></div>
            </div>

            <div id="cards-area" class="cards-area">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div id="screen-preview" class="screen" style="background: #000;">
        <img id="preview-img" style="width: 100%; flex: 1; object-fit: contain;">
        <div style="padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.8);">
            <button class="btn btn-secondary" onclick="showScreen('home')">✕ やり直し</button>
            <button class="btn btn-primary" onclick="startAnalysis()">🤖 AI解析スタート</button>
        </div>
    </div>

    <div id="screen-analyzing" class="screen" style="align-items: center; justify-content: center; text-align: center; gap: 20px;">
        <div class="spinner"></div>
        <h2>AI解析中...</h2>
        <p style="color: #64748b;">Gemini AIが画像を読み取っています</p>
    </div>

    <div id="screen-form" class="screen" style="overflow-y: auto;">
        <div class="app-header">
            <button class="back-btn" onclick="showScreen('home')">←</button>
            <h1>内容の確認・編集</h1>
        </div>
        <img id="form-photo" src="" style="width: 100%; max-height: 200px; object-fit: cover;">
        <div style="padding: 20px 20px 40px;">
            <div style="background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); border-radius: 12px; padding: 10px; font-size: 12px; color: #60a5fa; margin-bottom: 20px; text-align: center;">✨ AIが自動入力しました（修正可能です）</div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">📅 日付</label>
                    <input type="date" id="f-date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">⏰ 時間</label>
                    <input type="time" id="f-time" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">📦 品名</label>
                <input type="text" id="f-item" class="form-input" placeholder="例: 黒い財布">
            </div>
            <div class="form-group">
                <label class="form-label">📍 場所</label>
                <input type="text" id="f-location" class="form-input" placeholder="例: 2番カウンター付近">
            </div>
            <div class="form-group">
                <label class="form-label">👤 担当者</label>
                <input type="text" id="f-person" class="form-input" placeholder="氏名を入力">
            </div>
            <div class="form-group">
                <label class="form-label">📝 備考</label>
                <textarea id="f-notes" class="form-textarea" placeholder="特徴など"></textarea>
            </div>
            <button class="btn btn-success btn-lg" onclick="submitForm()" id="submit-btn">✅ スプレッドシートに登録</button>
        </div>
    </div>

    <div id="screen-success" class="screen" style="align-items: center; justify-content: center; text-align: center; gap: 30px; padding: 40px;">
        <div style="font-size: 80px;">✅</div>
        <h2>登録が完了しました！</h2>
        <div style="width: 100%; display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-primary" onclick="showScreen('home'); loadData();">🏠 ホームに戻って確認</button>
            <button class="btn btn-secondary" onclick="openCamera()">📷 続けて登録する</button>
        </div>
    </div>

    <div class="modal-overlay" id="img-modal" onclick="closeModal()">
        <img class="modal-img" id="modal-img-el">
    </div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
    <div class="toast" id="toast"></div>

    <script>
        /* ── Configuration ── */
        const GAS_URL_KEY = 'gasApiUrl';
        const SELF_URL = window.location.href.split('?')[0];
        const IS_GAS = SELF_URL.includes('script.google.com');
        let GAS_URL = IS_GAS ? SELF_URL : (localStorage.getItem(GAS_URL_KEY) || '');

        let allItems = [];
        let curPeriod = 'week';
        let curFilter = 'all';
        const state = { base64: null, mime: 'image/jpeg', aiResult: null, driveFileId: null };

        /* ── Initialization ── */
        window.addEventListener('load', () => {
            if (GAS_URL) {
                showScreen('home');
                loadData();
            } else {
                showScreen('setup');
            }
        });

        function saveGasUrl() {
            const url = document.getElementById('gas-url-input').value.trim();
            if (!url.startsWith('https://script.google.com')) {
                showToast('⚠️ 有効なGASのURLを入力してください');
                return;
            }
            GAS_URL = url;
            localStorage.setItem(GAS_URL_KEY, url);
            showScreen('home');
            loadData();
        }

        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + name).classList.add('active');
            window.scrollTo(0, 0);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function scrollToList() {
            document.getElementById('list-section').scrollIntoView({ behavior: 'smooth' });
        }

        /* ── Camera & Analysis ── */
        function openCamera() {
            const input = document.getElementById('camera-input');
            input.value = '';
            input.click();
        }

        document.getElementById('camera-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (re) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 1200;
                    if (w > h && w > max) { h *= max/w; w = max; }
                    else if (h > max) { w *= max/h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    state.base64 = dataUrl.split(',')[1];
                    document.getElementById('preview-img').src = dataUrl;
                    document.getElementById('form-photo').src = dataUrl;
                    showScreen('preview');
                };
                img.src = re.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function callGasApi(payload) {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }

        async function startAnalysis() {
            showScreen('analyzing');
            try {
                const result = await callGasApi({ action: 'analyze', imageBase64: state.base64, imageMime: 'image/jpeg' });
                if (!result.success) throw new Error(result.error);
                
                state.driveFileId = result.driveFileId;
                const ai = result.aiResult || {};
                const now = new Date();
                document.getElementById('f-date').value = now.toISOString().split('T')[0];
                document.getElementById('f-time').value = now.toTimeString().slice(0, 5);
                document.getElementById('f-item').value = ai.item || '';
                document.getElementById('f-location').value = ai.location || '';
                document.getElementById('f-notes').value = ai.notes || '';
                showScreen('form');
            } catch (e) {
                showToast('❌ 解析失敗: ' + e.message);
                showScreen('home');
            }
        }

        async function submitForm() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '送信中...';
            
            try {
                const res = await callGasApi({
                    action: 'submit',
                    driveFileId: state.driveFileId,
                    date: document.getElementById('f-date').value,
                    time: document.getElementById('f-time').value,
                    item: document.getElementById('f-item').value,
                    location: document.getElementById('f-location').value,
                    person: document.getElementById('f-person').value,
                    notes: document.getElementById('f-notes').value
                });
                if (!res.success) throw new Error(res.error);
                showScreen('success');
            } catch (e) {
                showToast('❌ 送信失敗: ' + e.message);
                btn.disabled = false;
                btn.textContent = '再試行';
            }
        }

        /* ── List Logic ── */
        async function loadData() {
            const area = document.getElementById('cards-area');
            area.innerHTML = '<div class="spinner"></div>';
            
            try {
                const res = await callGasApi({ action: 'list', period: curPeriod });
                allItems = res.items || [];
                renderCards();
            } catch (e) {
                area.innerHTML = `<div style="text-align:center; padding:40px; color:#ef4444;">❌ データの読み込みに失敗しました</div>`;
            }
        }

        function setPeriod(p) {
            curPeriod = p;
            document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('pt-' + p).classList.add('active');
            loadData();
        }

        function setFilter(f) {
            curFilter = f;
            document.querySelectorAll('.filter-chip').forEach(t => t.classList.remove('active'));
            document.getElementById('fc-' + f).classList.add('active');
            renderCards();
        }

        function renderCards() {
            const area = document.getElementById('cards-area');
            const filtered = allItems.filter(it => {
                const isRet = it.status && it.status.includes('返却');
                const isPolice = it.status && it.status.includes('警察');
                if (curFilter === 'keep') return !isRet && !isPolice;
                if (curFilter === 'ret') return isRet;
                if (curFilter === 'police') return isPolice;
                return true;
            });

            document.getElementById('stats-label').textContent = `${curPeriod === 'week' ? '今週' : curPeriod === 'month' ? '今月' : '全期間'}: ${filtered.length}件表示中`;

            if (filtered.length === 0) {
                area.innerHTML = `<div style="text-align:center; padding:60px; color:#475569;">📭 データがありません</div>`;
                return;
            }

            area.innerHTML = filtered.map((it, idx) => {
                const isRet = it.status && it.status.includes('返却');
                const isPolice = it.status && it.status.includes('警察');
                const isProcessed = isRet || isPolice; 
                
                let badgeClass = 'badge-pending';
                let statusText = it.status || '保管中';
                if (isRet) badgeClass = 'badge-returned';
                else if (isPolice) badgeClass = 'badge-police';

                const notesHtml = it.notes ? `<div class="item-notes">${it.notes}</div>` : '';

                return `
                    <div class="item-card ${isProcessed ? 'returned' : ''}">
                        ${it.image ? `<img src="${it.image}" class="item-thumb" onclick="openModal('${it.image}')">` : '<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;">📷</div>'}
                        <div class="item-info">
                            <div class="item-name">${it.item || '品名なし'}</div>
                            
                            <div style="display: flex; gap: 8px; align-items: flex-start;">
                                <div style="flex: 1; min-width: 0;">
                                    <div class="item-meta">📅 ${it.date || ''} ${it.time || ''}</div>
                                    <div class="item-meta">📍 ${it.location || '---'}</div>
                                    <span class="badge ${badgeClass}">${statusText}</span>
                                    
                                    ${!isProcessed ? `
                                        <div class="action-btns">
                                            <button class="return-btn-small" onclick="quickReturn(${it.row}, '${it.sheetName}', '${it.item}')">📦 返却</button>
                                            <button class="return-btn-small police-btn" onclick="quickPolice(${it.row}, '${it.sheetName}', '${it.item}')">🚓 警察</button>
                                            <button class="return-btn-small delete-btn" onclick="quickDelete(${it.row}, '${it.sheetName}', '${it.item}')">🗑️ 削除</button>
                                        </div>
                                    ` : `
                                        <div class="action-btns">
                                            <button class="return-btn-small delete-btn" onclick="quickDelete(${it.row}, '${it.sheetName}', '${it.item}')">🗑️ 削除</button>
                                        </div>
                                    `}
                                </div>
                                ${notesHtml}
                            </div>
                            
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function quickReturn(row, sheet, name) {
            if (!confirm(`「${name}」を持ち主へ返却済みにしますか？`)) return;
            const today = new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
            try {
                const res = await callGasApi({ action: 'updateStatus', row: row, sheetName: sheet, status: '返却済み ✅', returnDate: today });
                if (res.success) { showToast('✅ 返却済みに更新しました'); loadData(); }
            } catch (e) { showToast('❌ 更新失敗'); }
        }

        async function quickPolice(row, sheet, name) {
            if (!confirm(`「${name}」を警察へ届出済みにしますか？`)) return;
            const today = new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
            try {
                const res = await callGasApi({ action: 'updateStatus', row: row, sheetName: sheet, status: '警察届出 🚓', returnDate: today });
                if (res.success) { showToast('🚓 警察届出済みに更新しました'); loadData(); }
            } catch (e) { showToast('❌ 更新失敗'); }
        }

        // 削除ボタンの処理
        async function quickDelete(row, sheet, name) {
            if (!confirm(`⚠️ 本当に「${name}」のデータを削除しますか？\n※この操作は取り消せません（スプレッドシートからも消去されます）。`)) return;
            try {
                const res = await callGasApi({ action: 'delete', row: row, sheetName: sheet });
                if (res.success) {
                    showToast('🗑️ 削除しました');
                    loadData(); // リストを再読み込み
                } else {
                    showToast('❌ 削除失敗: ' + (res.error || 'エラー'));
                }
            } catch (e) { showToast('❌ 通信エラー'); }
        }

        function openModal(url) {
            document.getElementById('modal-img-el').src = url;
            document.getElementById('img-modal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('img-modal').classList.remove('open');
        }
    </script>
</body>
</html>
