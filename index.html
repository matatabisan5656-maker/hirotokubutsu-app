<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>拾得物台帳 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── Base & Layout ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans JP', -apple-system, sans-serif;
            background: linear-gradient(160deg, #0a0f1e 0%, #101b35 50%, #0d1a2d 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; animation: screenIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Common UI ── */
        .app-header {
            display: flex; align-items: center; padding: 14px 20px; gap: 10px;
            background: rgba(10, 15, 30, 0.85); border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .app-header h1 { font-size: 17px; font-weight: 700; color: #f1f5f9; }
        .back-btn { background: none; border: none; color: #94a3b8; font-size: 22px; cursor: pointer; padding: 6px 10px 6px 0; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 17px 24px; border: none; border-radius: 18px;
            font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; width: 100%; position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: #fff; box-shadow: 0 6px 30px rgba(59, 130, 246, 0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #047857 100%); color: #fff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lg { padding: 20px 28px; font-size: 18px; border-radius: 20px; }

        /* ── Forms ── */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .form-input, .form-textarea {
            width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; color: #f1f5f9; font-family: inherit; font-size: 15px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── Home Hero ── */
        .hero-section { padding: 40px 24px; text-align: center; display: flex; flex-direction: column; gap: 24px; align-items: center; }
        .home-logo { font-size: 80px; filter: drop-shadow(0 8px 32px rgba(59, 130, 246, 0.4)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .home-title { font-size: 28px; font-weight: 900; color: #f1f5f9; line-height: 1.3; }
        .home-subtitle { font-size: 14px; color: #64748b; margin-top: 8px; }

        /* ── List UI (Tabs & Filters) ── */
        .list-container { background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: 50px; }
        .list-header-sticky { position: sticky; top: 0; z-index: 40; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .period-tabs { display: flex; padding: 0 16px; margin-bottom: 12px; }
        .period-tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 700; color: #475569; border: none; background: none; font-family: inherit; cursor: pointer; border-bottom: 2px solid transparent; }
        .period-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
        .filter-bar { padding: 0 16px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #64748b; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .filter-chip.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        /* ── Item Cards ── */
        .cards-area { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .item-card { display: flex; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 14px; align-items: center; }
        .item-card.returned { opacity: 0.6; }
        .item-thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 12px; background: rgba(255,255,255,0.03); flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 5px; }
        .badge-pending { background: rgba(234,179,8,0.12); color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); }
        .badge-returned { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
        
        .return-btn-small { margin-top: 8px; padding: 5px 12px; font-size: 11px; font-weight: 700; border: 1px solid rgba(139,92,246,0.3); background: rgba(139,92,246,0.08); color: #a78bfa; border-radius: 12px; cursor: pointer; }

        /* ── Toast & Modal ── */
        .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(30, 40, 60, 0.95); color: #f1f5f9; padding: 14px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; z-index: 100; opacity: 0; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.open { display: flex; }
        .modal-img { max-width: 90vw; max-height: 80vh; border-radius: 12px; }

        /* ── Utils ── */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59,130,246,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="screen-setup" class="screen">
        <div class="hero-section">
            <div class="home-logo">⚙️</div>
            <div style="background: rgba(255,255,255,0.04); padding: 28px; border-radius: 24px; width: 100%; max-width: 400px;">
                <h2 style="margin-bottom: 12px;">初回設定</h2>
                <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">GASのデプロイURLを入力してください。</p>
                <textarea class="form-input" id="gas-url-input" rows="3" placeholder="https://script.google.com/macros/s/XXXX/exec" style="margin-bottom: 15px;"></textarea>
                <button class="btn btn-primary" onclick="saveGasUrl()">✅ 設定を保存して開始</button>
            </div>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="hero-section">
            <div class="home-logo">📦</div>
            <div>
                <h1 class="home-title">拾得物台帳 Pro</h1>
                <p class="home-subtitle">AIが画像を解析して自動で台帳を作成します</p>
            </div>
            <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary btn-lg" onclick="openCamera()">📷 撮影して登録</button>
                <button class="btn btn-secondary" onclick="scrollToList()" style="font-size: 14px;">📋 履歴を確認（下へ）</button>
                <button class="btn btn-secondary" onclick="showScreen('setup')" style="font-size: 12px; padding: 10px;">⚙️ URL設定変更</button>
            </div>
        </div>

        <div class="list-container" id="list-section">
            <div class="list-header-sticky">
                <div class="period-tabs">
                    <button class="period-tab active" id="pt-week" onclick="setPeriod('week')">今週</button>
                    <button class="period-tab" id="pt-month" onclick="setPeriod('month')">今月</button>
                    <button class="period-tab" id="pt-all" onclick="setPeriod('all')">全部</button>
                </div>
                <div class="filter-bar">
                    <button class="filter-chip active" id="fc-all" onclick="setFilter('all')">すべて</button>
                    <button class="filter-chip" id="fc-keep" onclick="setFilter('keep')">保管中</button>
                    <button class="filter-chip" id="fc-ret" onclick="setFilter('ret')">返却済み</button>
                </div>
                <div id="stats-label" style="padding: 0 16px; font-size: 11px; color: #475569;"></div>
            </div>

            <div id="cards-area" class="cards-area">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div id="screen-preview" class="screen" style="background: #000;">
        <img id="preview-img" style="width: 100%; flex: 1; object-fit: contain;">
        <div style="padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.8);">
            <button class="btn btn-secondary" onclick="showScreen('home')">✕ やり直し</button>
            <button class="btn btn-primary" onclick="startAnalysis()">🤖 AI解析スタート</button>
        </div>
    </div>

    <div id="screen-analyzing" class="screen" style="align-items: center; justify-content: center; text-align: center; gap: 20px;">
        <div class="spinner"></div>
        <h2>AI解析中...</h2>
        <p style="color: #64748b;">Gemini AIが画像を読み取っています</p>
    </div>

    <div id="screen-form" class="screen" style="overflow-y: auto;">
        <div class="app-header">
            <button class="back-btn" onclick="showScreen('home')">←</button>
            <h1>内容の確認・編集</h1>
        </div>
        <img id="form-photo" src="" style="width: 100%; max-height: 200px; object-fit: cover;">
        <div style="padding: 20px 20px 40px;">
            <div style="background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); border-radius: 12px; padding: 10px; font-size: 12px; color: #60a5fa; margin-bottom: 20px; text-align: center;">✨ AIが自動入力しました（修正可能です）</div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">📅 日付</label>
                    <input type="date" id="f-date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">⏰ 時間</label>
                    <input type="time" id="f-time" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">📦 品名</label>
                <input type="text" id="f-item" class="form-input" placeholder="例: 黒い財布">
            </div>
            <div class="form-group">
                <label class="form-label">📍 場所</label>
                <input type="text" id="f-location" class="form-input" placeholder="例: 2番カウンター付近">
            </div>
            <div class="form-group">
                <label class="form-label">👤 担当者</label>
                <input type="text" id="f-person" class="form-input" placeholder="氏名を入力">
            </div>
            <div class="form-group">
                <label class="form-label">📝 備考</label>
                <textarea id="f-notes" class="form-textarea" placeholder="特徴など"></textarea>
            </div>
            <button class="btn btn-success btn-lg" onclick="submitForm()" id="submit-btn">✅ スプレッドシートに登録</button>
        </div>
    </div>

    <div id="screen-success" class="screen" style="align-items: center; justify-content: center; text-align: center; gap: 30px; padding: 40px;">
        <div style="font-size
