<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾得物台帳 一覧</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', -apple-system, sans-serif;
            background: linear-gradient(160deg, #0a0f1e 0%, #101b35 50%, #0d1a2d 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 20;
            background: rgba(10,15,30,0.92);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            padding: 12px 16px 0;
        }
        .header-row1 {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .back-btn {
            background: none; border: none; color: #60a5fa;
            font-size: 22px; cursor: pointer; padding: 4px 8px 4px 0;
            line-height: 1;
        }
        .header-title { font-size: 17px; font-weight: 700; color: #f1f5f9; flex: 1; }
        .refresh-btn {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid rgba(59,130,246,0.35);
            background: rgba(59,130,246,0.1); color: #60a5fa;
            font-family: inherit; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .refresh-btn:hover { background: rgba(59,130,246,0.25); }
        .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

        /* ── Period Tabs ── */
        .period-tabs {
            display: flex; gap: 0; border-bottom: 2px solid rgba(255,255,255,0.06);
        }
        .period-tab {
            flex: 1; padding: 10px 0; text-align: center;
            font-size: 13px; font-weight: 700; cursor: pointer;
            color: #475569; border: none; background: none;
            font-family: inherit; transition: color 0.2s;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
        }
        .period-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }

        /* ── Status filter chips ── */
        .filter-bar {
            padding: 10px 16px 0;
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .filter-chip {
            padding: 4px 12px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #64748b;
            font-family: inherit; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .filter-chip.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        /* ── Stats bar ── */
        .stats-bar {
            padding: 8px 16px; font-size: 11px; color: #475569;
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        }
        .stat-item { display: flex; align-items: center; gap: 4px; }
        .stat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

        /* ── Cards ── */
        .cards {
            padding: 10px 14px 80px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            display: flex; gap: 12px; align-items: stretch;
            padding: 12px 14px 12px 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .card:active, .card:hover { background: rgba(255,255,255,0.07); }
        .card.returned { opacity: 0.55; }

        /* thumbnail */
        .card-thumb {
            flex-shrink: 0;
            width: 72px; height: 72px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            display: flex; align-items: center; justify-content: center;
        }
        .card-thumb img {
            width: 72px; height: 72px; object-fit: cover;
            border-radius: 12px; display: block;
        }
        .card-thumb .no-img {
            font-size: 26px; color: rgba(255,255,255,0.15);
        }

        /* card body */
        .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .card-name { font-size: 15px; font-weight: 700; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 11px; color: #64748b; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .card-meta-icon { font-size: 10px; }
        .card-loc  { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 4px; }

        .card-footer { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }

        /* ── Status Badge ── */
        .badge {
            display: inline-block; padding: 3px 9px; border-radius: 20px;
            font-size: 10px; font-weight: 700; white-space: nowrap;
        }
        .badge-done     { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .badge-pending  { background: rgba(234,179,8,0.12);  color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); }
        .badge-returned { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
        .badge-error    { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

        /* 返却ボタン */
        .return-btn {
            padding: 4px 10px; border-radius: 20px;
            border: 1px solid rgba(139,92,246,0.3);
            background: rgba(139,92,246,0.08); color: #a78bfa;
            font-family: inherit; font-size: 10px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .return-btn:hover { background: rgba(139,92,246,0.2); }

        /* ── Setup Banner ── */
        .setup-banner {
            margin: 40px auto; max-width: 480px; padding: 28px 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px; text-align: center;
        }
        .setup-banner h2 { font-size: 18px; color: #f1f5f9; margin-bottom: 10px; }
        .setup-banner p  { font-size: 13px; color: #64748b; margin-bottom: 18px; line-height: 1.7; }
        .setup-input {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
            color: #f1f5f9; font-family: inherit; font-size: 13px; margin-bottom: 12px;
        }
        .setup-input:focus { outline: none; border-color: #3b82f6; }
        .setup-save-btn {
            width: 100%; padding: 13px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff;
            font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
        }

        /* ── State views ── */
        .state-view {
            text-align: center; padding: 80px 20px; color: #334155;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(59,130,246,0.1);
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 0.9s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Image modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-img {
            max-width: 94vw; max-height: 86vh; border-radius: 14px;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.12); border: none; color: #fff;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(30,40,60,0.96); color: #f1f5f9;
            padding: 11px 20px; border-radius: 14px; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 200;
            opacity: 0; transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (min-width: 600px) {
            .cards { max-width: 600px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-row1">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">📋 拾得物一覧</div>
        <button class="refresh-btn" id="refresh-btn" onclick="loadData()">🔄 更新</button>
    </div>
    <!-- 期間タブ -->
    <div class="period-tabs">
        <button class="period-tab active" id="pt-week"  onclick="setPeriod('week')">今週</button>
        <button class="period-tab"        id="pt-month" onclick="setPeriod('month')">今月</button>
        <button class="period-tab"        id="pt-all"   onclick="setPeriod('all')">全部</button>
    </div>
</div>

<!-- Status filter chips -->
<div class="filter-bar">
    <button class="filter-chip active" id="fc-all"  onclick="setFilter('all')">すべて</button>
    <button class="filter-chip"        id="fc-keep" onclick="setFilter('keep')">保管中</button>
    <button class="filter-chip"        id="fc-ret"  onclick="setFilter('ret')">返却済み</button>
</div>

<!-- Stats -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Main area -->
<div id="main-content"></div>
<div class="cards" id="cards-area" style="display:none;"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Image modal -->
<div class="modal-overlay" id="img-modal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modal-img-el" src="" alt="拾得物写真">
</div>

<script>
    /* ── Config ── */
    const GAS_URL_KEY = 'gasApiUrl';
    const SELF_URL    = window.location.href.split('?')[0];
    const IS_GAS      = SELF_URL.includes('script.google.com');
    let GAS_URL       = IS_GAS ? SELF_URL : (localStorage.getItem(GAS_URL_KEY) || '');

    let allItems   = [];
    let curPeriod  = localStorage.getItem('listPeriod') || 'week';
    let curFilter  = 'all';

    /* ── Boot ── */
    window.addEventListener('load', function() {
        // タブ初期状態
        setPeriodUI(curPeriod);
        if (GAS_URL) {
            loadData();
        } else {
            showSetup();
        }
    });

    function goBack() {
        if (IS_GAS) {
            // GASウェブアプリ上では index画面へ（doGetで返ってくる）
            window.location.href = GAS_URL;
        } else {
            window.history.length > 1 ? history.back() : (window.location.href = 'index.html');
        }
    }

    /* ── Setup ── */
    function showSetup() {
        document.getElementById('main-content').innerHTML =
            '<div class="setup-banner">' +
            '<h2>⚙️ GAS URLの設定</h2>' +
            '<p>GASのデプロイURLを入力してください。<br>メインアプリで設定済みなら自動で読み込まれます。</p>' +
            '<input class="setup-input" id="url-input" type="text" placeholder="https://script.google.com/macros/s/XXXX/exec">' +
            '<button class="setup-save-btn" onclick="saveUrl()">✅ 設定して読み込む</button>' +
            '</div>';
    }
    function saveUrl() {
        var url = (document.getElementById('url-input').value || '').trim();
        if (!url || !url.startsWith('https://script.google.com')) {
            showToast('⚠️ 正しいURLを入力してください'); return;
        }
        GAS_URL = url;
        localStorage.setItem(GAS_URL_KEY, url);
        loadData();
    }

    /* ── Period ── */
    function setPeriod(p) {
        curPeriod = p;
        localStorage.setItem('listPeriod', p);
        setPeriodUI(p);
        loadData();
    }
    function setPeriodUI(p) {
        ['week','month','all'].forEach(function(k) {
            document.getElementById('pt-' + k).classList.toggle('active', k === p);
        });
    }

    /* ── Status filter ── */
    function setFilter(f) {
        curFilter = f;
        ['all','keep','ret'].forEach(function(k) {
            document.getElementById('fc-' + k).classList.toggle('active', k === f);
        });
        renderCards();
    }

    /* ── Load ── */
    function loadData() {
        var btn = document.getElementById('refresh-btn');
        if (btn) { btn.classList.add('loading'); btn.textContent = '読み込み中...'; }

        document.getElementById('main-content').innerHTML =
            '<div class="state-view"><div class="spinner"></div>データを取得中...</div>';
        document.getElementById('cards-area').style.display = 'none';
        document.getElementById('stats-bar').innerHTML = '';

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'list', period: curPeriod }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(result) {
            if (btn) { btn.classList.remove('loading'); btn.textContent = '🔄 更新'; }
            if (!result.success) throw new Error(result.error || '取得失敗');
            allItems = result.items || [];
            renderCards();
        })
        .catch(function(err) {
            if (btn) { btn.classList.remove('loading'); btn.textContent = '🔄 更新'; }
            document.getElementById('main-content').innerHTML =
                '<div class="state-view">❌ ' + esc(err.message) +
                '<br><br><small style="color:#475569">GAS URLを確認してください</small></div>';
        });
    }

    /* ── Render ── */
    function renderCards() {
        var items = allItems.filter(function(it) {
            if (curFilter === 'keep') return !it.status || !it.status.includes('返却');
            if (curFilter === 'ret')  return it.status && it.status.includes('返却');
            return true;
        });

        // 統計
        var total    = allItems.length;
        var keeping  = allItems.filter(function(it) { return !it.status || !it.status.includes('返却'); }).length;
        var returned = allItems.filter(function(it) { return it.status && it.status.includes('返却'); }).length;
        var label    = curPeriod === 'week' ? '今週' : curPeriod === 'month' ? '今月' : '全期間';
        document.getElementById('stats-bar').innerHTML =
            '<span class="stat-item"><span class="stat-dot" style="background:#64748b"></span>' + label + ' ' + total + '件</span>' +
            '<span class="stat-item"><span class="stat-dot" style="background:#fbbf24"></span>保管中 ' + keeping + '件</span>' +
            '<span class="stat-item"><span class="stat-dot" style="background:#a78bfa"></span>返却済み ' + returned + '件</span>';

        document.getElementById('main-content').innerHTML = '';

        if (allItems.length === 0) {
            document.getElementById('cards-area').style.display = 'none';
            document.getElementById('main-content').innerHTML =
                '<div class="state-view"><div style="font-size:48px;margin-bottom:12px;opacity:.4">📭</div>' +
                label + 'の登録がありません</div>';
            return;
        }
        if (items.length === 0) {
            document.getElementById('cards-area').style.display = 'none';
            document.getElementById('main-content').innerHTML =
                '<div class="state-view">該当する登録がありません</div>';
            return;
        }

        document.getElementById('cards-area').style.display = 'flex';
        document.getElementById('cards-area').innerHTML = items.map(function(it, idx) {
            var isRet = it.status && it.status.includes('返却');
            var badgeClass =
                isRet                                        ? 'badge-returned' :
                it.status && it.status.includes('完了')     ? 'badge-done'     :
                it.status && it.status.includes('エラー')   ? 'badge-error'    :
                                                               'badge-pending';

            // 写真サムネイル
            var thumbHtml;
            if (it.image) {
                thumbHtml = '<img src="' + esc(it.image) + '" alt="写真" loading="lazy" ' +
                    'onerror="this.parentNode.innerHTML=\'<span class=\\\"no-img\\\">📷</span>\'" ' +
                    'onclick="openModal(\'' + esc(it.image) + '\')" style="cursor:zoom-in;">';
            } else {
                thumbHtml = '<span class="no-img">📷</span>';
            }

            // 返却ボタン（返却済みでなければ表示）
            var retBtn = !isRet
                ? '<button class="return-btn" onclick="markReturned(event,' + idx + ')">📦 返却</button>'
                : '';

            var dateTime = [it.date, it.time].filter(Boolean).join(' ');
            var loc      = it.location || '';

            return '<div class="card' + (isRet ? ' returned' : '') + '">' +
                '<div class="card-thumb">' + thumbHtml + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-name">' + esc(it.item || '---') + '</div>' +
                    '<div class="card-meta">' +
                        '<span class="card-meta-icon">🕐</span>' + esc(dateTime) +
                        (it.person ? ' <span class="card-meta-icon">👤</span>' + esc(it.person) : '') +
                    '</div>' +
                    (loc ? '<div class="card-loc"><span>📍</span>' + esc(loc) + '</div>' : '') +
                    '<div class="card-footer">' +
                        '<span class="badge ' + badgeClass + '">' + esc(it.status || '---') + '</span>' +
                        retBtn +
                    '</div>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    /* ── Return marked ── */
    function markReturned(e, idx) {
        e.stopPropagation();
        var items = allItems.filter(function(it) {
            if (curFilter === 'keep') return !it.status || !it.status.includes('返却');
            if (curFilter === 'ret')  return it.status && it.status.includes('返却');
            return true;
        });
        var it = items[idx];
        if (!it) return;
        var today = new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
        if (!confirm(esc(it.item || '---') + ' を返却済みにしますか？')) return;

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'updateStatus', row: it.row, sheetName: it.sheetName,
                status: '返却済み ✅', returnDate: today
            }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.success) {
                // ローカルのデータも更新
                var orig = allItems.find(function(x) { return x.row === it.row && x.sheetName === it.sheetName; });
                if (orig) orig.status = '返却済み ✅';
                renderCards();
                showToast('✅ 返却済みに更新しました');
            } else {
                showToast('❌ ' + (res.error || '更新失敗'));
            }
        })
        .catch(function() { showToast('❌ 通信エラー'); });
    }

    /* ── Modal ── */
    function openModal(url) {
        document.getElementById('modal-img-el').src = url;
        document.getElementById('img-modal').classList.add('open');
    }
    function closeModal() {
        document.getElementById('img-modal').classList.remove('open');
        document.getElementById('modal-img-el').src = '';
    }

    /* ── Utils ── */
    function esc(s) {
        var d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 3000);
    }
</script>
</body>
</html>
